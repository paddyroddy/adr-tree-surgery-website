---
name: Deploy

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  build-and-deploy:
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
    permissions:
      contents: write
    runs-on: ubuntu-slim
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/github-pages/jekyll@d7ef1ce76b6d02d7e81fe9bb3c22885c6376f986 # v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ruby-version: "4.0"
